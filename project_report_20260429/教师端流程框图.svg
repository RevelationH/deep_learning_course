<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1030" viewBox="0 0 1800 1030"><rect x="0" y="0" width="1800" height="1030" fill="#f8fbfe"/><text x="60" y="72" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="36" font-weight="700" fill="#16324c"><tspan x="60" dy="0">教师端内容生产与知识服务构建流程图</tspan></text><text x="60" y="118" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="22" font-weight="400" fill="#556676"><tspan x="60" dy="0">图示聚焦课程建设人员视角，强调资料接入、知识组织、资源生成与教学迭代的完整闭环。</tspan></text><g><rect x="100" y="170" width="720" height="190" rx="24" ry="24" fill="#ffffff" stroke="#345670" stroke-width="3"/><path d="M 124 170 H 796 A 24 24 0 0 1 820 194 V 222 H 100 V 194 A 24 24 0 0 1 124 170 Z" fill="#235a8c"/><rect x="100" y="198" width="720" height="24" fill="#235a8c"/><text x="118" y="204" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="24" font-weight="700" fill="#ffffff"><tspan x="118" dy="0">一、教学资料准备</tspan></text><text x="118" y="258" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="19" font-weight="400" fill="#202020"><tspan x="118" dy="0">• 课件 PDF 与教材章节</tspan><tspan x="118" dy="27">• 参考讲义与补充阅读</tspan><tspan x="118" dy="27">• 按课程周次统一归档</tspan></text></g><g><rect x="980" y="170" width="720" height="190" rx="24" ry="24" fill="#ffffff" stroke="#345670" stroke-width="3"/><path d="M 1004 170 H 1676 A 24 24 0 0 1 1700 194 V 222 H 980 V 194 A 24 24 0 0 1 1004 170 Z" fill="#235a8c"/><rect x="980" y="198" width="720" height="24" fill="#235a8c"/><text x="998" y="204" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="24" font-weight="700" fill="#ffffff"><tspan x="998" dy="0">二、内容解析与清洗</tspan></text><text x="998" y="258" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="19" font-weight="400" fill="#202020"><tspan x="998" dy="0">• 提取正文、标题与图表位置</tspan><tspan x="998" dy="27">• 清理页眉页脚与噪声内容</tspan><tspan x="998" dy="27">• 统一形成可处理文本单元</tspan></text></g><g><rect x="980" y="450" width="720" height="190" rx="24" ry="24" fill="#ffffff" stroke="#345670" stroke-width="3"/><path d="M 1004 450 H 1676 A 24 24 0 0 1 1700 474 V 502 H 980 V 474 A 24 24 0 0 1 1004 450 Z" fill="#235a8c"/><rect x="980" y="478" width="720" height="24" fill="#235a8c"/><text x="998" y="484" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="24" font-weight="700" fill="#ffffff"><tspan x="998" dy="0">三、课程知识建模</tspan></text><text x="998" y="538" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="19" font-weight="400" fill="#202020"><tspan x="998" dy="0">• 抽取知识点与核心关键词</tspan><tspan x="998" dy="27">• 建立章节、页码与来源映射</tspan><tspan x="998" dy="27">• 形成课程知识组织结构</tspan></text></g><g><rect x="100" y="450" width="720" height="190" rx="24" ry="24" fill="#ffffff" stroke="#345670" stroke-width="3"/><path d="M 124 450 H 796 A 24 24 0 0 1 820 474 V 502 H 100 V 474 A 24 24 0 0 1 124 450 Z" fill="#2f7466"/><rect x="100" y="478" width="720" height="24" fill="#2f7466"/><text x="118" y="484" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="24" font-weight="700" fill="#ffffff"><tspan x="118" dy="0">四、检索知识库与题库构建</tspan></text><text x="118" y="538" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="19" font-weight="400" fill="#202020"><tspan x="118" dy="0">• 建立 1206 个向量检索单元</tspan><tspan x="118" dy="27">• 生成课程检索索引与引用信息</tspan><tspan x="118" dy="27">• 形成 78 道练习题</tspan></text></g><g><rect x="100" y="730" width="720" height="190" rx="24" ry="24" fill="#ffffff" stroke="#345670" stroke-width="3"/><path d="M 124 730 H 796 A 24 24 0 0 1 820 754 V 782 H 100 V 754 A 24 24 0 0 1 124 730 Z" fill="#2f7466"/><rect x="100" y="758" width="720" height="24" fill="#2f7466"/><text x="118" y="764" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="24" font-weight="700" fill="#ffffff"><tspan x="118" dy="0">五、学生端服务发布</tspan></text><text x="118" y="818" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="19" font-weight="400" fill="#202020"><tspan x="118" dy="0">• 发布智能问答服务</tspan><tspan x="118" dy="27">• 发布练习测评服务</tspan><tspan x="118" dy="27">• 发布学习报告与复习入口</tspan></text></g><g><rect x="980" y="730" width="720" height="190" rx="24" ry="24" fill="#ffffff" stroke="#345670" stroke-width="3"/><path d="M 1004 730 H 1676 A 24 24 0 0 1 1700 754 V 782 H 980 V 754 A 24 24 0 0 1 1004 730 Z" fill="#763a82"/><rect x="980" y="758" width="720" height="24" fill="#763a82"/><text x="998" y="764" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="24" font-weight="700" fill="#ffffff"><tspan x="998" dy="0">六、教师审核与迭代更新</tspan></text><text x="998" y="818" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="19" font-weight="400" fill="#202020"><tspan x="998" dy="0">• 核查内容准确性与题目质量</tspan><tspan x="998" dy="27">• 补充新资料并修订课程资源</tspan><tspan x="998" dy="27">• 触发知识库与题库重建</tspan></text></g><g><line x1="820" y1="265" x2="980" y2="265" stroke="#0c6aa6" stroke-width="5" stroke-linecap="round"/><polygon points="980,265 966.5,271.5 966.5,258.5" fill="#0c6aa6"/></g><g><line x1="1340" y1="360" x2="1340" y2="450" stroke="#0c6aa6" stroke-width="5" stroke-linecap="round"/><polygon points="1340,450 1333.5,436.5 1346.5,436.5" fill="#0c6aa6"/></g><g><line x1="980" y1="545" x2="820" y2="545" stroke="#0c6aa6" stroke-width="5" stroke-linecap="round"/><polygon points="820,545 833.5,538.5 833.5,551.5" fill="#0c6aa6"/></g><g><line x1="460" y1="640" x2="460" y2="730" stroke="#0c6aa6" stroke-width="5" stroke-linecap="round"/><polygon points="460,730 453.5,716.5 466.5,716.5" fill="#0c6aa6"/></g><g><line x1="820" y1="825" x2="980" y2="825" stroke="#0c6aa6" stroke-width="5" stroke-linecap="round"/><polygon points="980,825 966.5,831.5 966.5,818.5" fill="#0c6aa6"/></g></svg>