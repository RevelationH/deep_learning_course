<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="40 20 1660 1100"><rect x="0" y="0" width="1800" height="1120" fill="#f8fbfe"/><text x="60" y="90" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="50" font-weight="700" fill="#16324c"><tspan x="60" dy="0">学生端与平台服务架构图</tspan></text><text x="60" y="136" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="31" font-weight="400" fill="#556676"><tspan x="60" dy="0">从访问入口、业务编排、课程知识服务到数据与运行支撑，展示平台的整体协同方式。</tspan></text><g><rect x="120" y="160" width="1560" height="140" rx="24" ry="24" fill="#ffffff" stroke="#345670" stroke-width="3"/><path d="M 144 160 H 1656 A 24 24 0 0 1 1680 184 V 212 H 120 V 184 A 24 24 0 0 1 144 160 Z" fill="#235a8c"/><rect x="120" y="188" width="1560" height="24" fill="#235a8c"/><text x="138" y="194" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="32" font-weight="700" fill="#ffffff"><tspan x="138" dy="0">学生访问层</tspan></text><text x="138" y="248" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="26" font-weight="400" fill="#202020"><tspan x="138" dy="0">登录/注册、课程问答、练习测评、学习报告、历史对话</tspan></text></g><g><rect x="120" y="380" width="1560" height="150" rx="24" ry="24" fill="#ffffff" stroke="#345670" stroke-width="3"/><path d="M 144 380 H 1656 A 24 24 0 0 1 1680 404 V 432 H 120 V 404 A 24 24 0 0 1 144 380 Z" fill="#235a8c"/><rect x="120" y="408" width="1560" height="24" fill="#235a8c"/><text x="138" y="414" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="32" font-weight="700" fill="#ffffff"><tspan x="138" dy="0">统一门厅与业务编排层</tspan></text><text x="138" y="468" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="26" font-weight="400" fill="#202020"><tspan x="138" dy="0">负责身份识别、会话管理、页面路由、请求汇聚和结果组织</tspan></text></g><g><rect x="120" y="610" width="440" height="240" rx="24" ry="24" fill="#ffffff" stroke="#345670" stroke-width="3"/><path d="M 144 610 H 536 A 24 24 0 0 1 560 634 V 662 H 120 V 634 A 24 24 0 0 1 144 610 Z" fill="#2f7466"/><rect x="120" y="638" width="440" height="24" fill="#2f7466"/><text x="138" y="644" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="32" font-weight="700" fill="#ffffff"><tspan x="138" dy="0">智能问答服务</tspan></text><text x="138" y="698" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="26" font-weight="400" fill="#202020"><tspan x="138" dy="0">结合课程检索与上下文进行回答</tspan><tspan x="138" dy="30">优先提供课程来源与讲义定位</tspan></text></g><g><rect x="680" y="610" width="440" height="240" rx="24" ry="24" fill="#ffffff" stroke="#345670" stroke-width="3"/><path d="M 704 610 H 1096 A 24 24 0 0 1 1120 634 V 662 H 680 V 634 A 24 24 0 0 1 704 610 Z" fill="#2f7466"/><rect x="680" y="638" width="440" height="24" fill="#2f7466"/><text x="698" y="644" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="32" font-weight="700" fill="#ffffff"><tspan x="698" dy="0">练习测评服务</tspan></text><text x="698" y="698" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="26" font-weight="400" fill="#202020"><tspan x="698" dy="0">按知识点组织题目</tspan><tspan x="698" dy="30">支持图文题与自动评分</tspan></text></g><g><rect x="1240" y="610" width="440" height="240" rx="24" ry="24" fill="#ffffff" stroke="#345670" stroke-width="3"/><path d="M 1264 610 H 1656 A 24 24 0 0 1 1680 634 V 662 H 1240 V 634 A 24 24 0 0 1 1264 610 Z" fill="#2f7466"/><rect x="1240" y="638" width="440" height="24" fill="#2f7466"/><text x="1258" y="644" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="32" font-weight="700" fill="#ffffff"><tspan x="1258" dy="0">学习报告服务</tspan></text><text x="1258" y="698" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="26" font-weight="400" fill="#202020"><tspan x="1258" dy="0">统计答题情况与知识点覆盖</tspan><tspan x="1258" dy="30">给出后续复习建议</tspan></text></g><g><rect x="120" y="930" width="800" height="170" rx="24" ry="24" fill="#ffffff" stroke="#345670" stroke-width="3"/><path d="M 144 930 H 896 A 24 24 0 0 1 920 954 V 982 H 120 V 954 A 24 24 0 0 1 144 930 Z" fill="#235a8c"/><rect x="120" y="958" width="800" height="24" fill="#235a8c"/><text x="138" y="964" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="32" font-weight="700" fill="#ffffff"><tspan x="138" dy="0">课程知识资产层</tspan></text><text x="138" y="1018" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="24" font-weight="400" fill="#202020"><tspan x="138" dy="0">课程 PDF、知识点、题库与讲义图像资源，</tspan><tspan x="138" dy="28">为课程问答、练习与来源定位提供内容支撑。</tspan></text></g><g><rect x="960" y="930" width="720" height="170" rx="24" ry="24" fill="#ffffff" stroke="#345670" stroke-width="3"/><path d="M 984 930 H 1656 A 24 24 0 0 1 1680 954 V 982 H 960 V 954 A 24 24 0 0 1 984 930 Z" fill="#763a82"/><rect x="960" y="958" width="720" height="24" fill="#763a82"/><text x="978" y="964" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="32" font-weight="700" fill="#ffffff"><tspan x="978" dy="0">数据与运行支撑层</tspan></text><text x="978" y="1018" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="24" font-weight="400" fill="#202020"><tspan x="978" dy="0">保存用户、会话、答题记录与学习报告快照，</tspan><tspan x="978" dy="28">支撑系统并发访问、结果回看与持续运行。</tspan></text></g><g><line x1="900" y1="300" x2="900" y2="380" stroke="#0c6aa6" stroke-width="5" stroke-linecap="round"/><polygon points="900,380 893.5,366.5 906.5,366.5" fill="#0c6aa6"/></g><g><line x1="900" y1="530" x2="340" y2="610" stroke="#0c6aa6" stroke-width="5" stroke-linecap="round"/><polygon points="340,610 352.5,601.6 354.3,614.5" fill="#0c6aa6"/></g><g><line x1="900" y1="530" x2="900" y2="610" stroke="#0c6aa6" stroke-width="5" stroke-linecap="round"/><polygon points="900,610 893.5,596.5 906.5,596.5" fill="#0c6aa6"/></g><g><line x1="900" y1="530" x2="1460" y2="610" stroke="#0c6aa6" stroke-width="5" stroke-linecap="round"/><polygon points="1460,610 1445.7,614.5 1447.5,601.6" fill="#0c6aa6"/></g><g><line x1="340" y1="850" x2="520" y2="930" stroke="#0c6aa6" stroke-width="5" stroke-linecap="round"/><polygon points="520,930 505.4,931.4 511.5,919.8" fill="#0c6aa6"/></g><g><line x1="900" y1="850" x2="900" y2="930" stroke="#0c6aa6" stroke-width="5" stroke-linecap="round"/><polygon points="900,930 893.5,916.5 906.5,916.5" fill="#0c6aa6"/></g><g><line x1="1460" y1="850" x2="1320" y2="930" stroke="#0c6aa6" stroke-width="5" stroke-linecap="round"/><polygon points="1320,930 1328.0,917.4 1334.4,928.8" fill="#0c6aa6"/></g></svg>
